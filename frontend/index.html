<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background effects -->
  <div id="particles-js"></div>

  <!-- Blob behind UI -->
  <div class="blob-container">
    <div class="blob"></div>
    <div class="glow-blob"></div>
  </div>

  <!-- Foreground content -->
  <div class="jarvis-box text-center">
    <h1><span class="typewriter"></span></h1>
    <div class="input-group mt-4 w-75 mx-auto">
      <input type="text" id="commandInput" class="form-control" placeholder="Type a command..." />
      <button class="btn btn-info" onclick="sendCommand()">Send</button>
    </div>
    <div id="chat-box" class="mt-4 text-start"></div>
  </div>

  <!-- Scripts -->
  <script src="particles.min.js"></script>
  <script src="script.js"></script>
  <script>
    particlesJS.load('particles-js', 'particles.json', function () {
      console.log('✅ Particles loaded.');
    });
  </script>
</body>
</html>
